name: beauty_ai_app
description: AI-powered eyebrow simulation for beauty salons
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Supabase
  supabase_flutter: ^2.3.0

  # RevenueCat (temporarily disabled for testing)
  # purchases_flutter: ^6.17.0

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.4

  # Face Detection (Google ML Kit)
  google_mlkit_face_detection: ^0.9.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  photo_view: ^0.14.0

  # Navigation
  go_router: ^13.0.1

  # Utils
  intl: ^0.18.1
  uuid: ^4.2.2
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1

  # Signature
  signature: ^5.4.1

  # Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # HTTP
  dio: ^5.4.0

  # Date/Time
  table_calendar: ^3.0.9

  # Icons
  cupertino_icons: ^1.0.6
  flutter_feather_icons: ^2.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true

